<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="form-container">

    <!-- LOGIN -->
    <form id="loginForm" class="form active">
      <h2>Login</h2>
      <input type="text" id="loginNIK" placeholder="NIK" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Masuk</button>
      <p>Belum punya akun? <span onclick="showRegister()">Daftar</span></p>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" class="form">
      <h2>Register</h2>
      <input type="text" id="nama" placeholder="Nama Lengkap" required>
      <input type="date" id="tglLahir" required>
      <input type="text" id="nik" placeholder="NIK" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Daftar</button>
      <p>Sudah punya akun? <span onclick="showLogin()">Login</span></p>
    </form>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
